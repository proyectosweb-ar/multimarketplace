<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MultiMarketPlace | idea meet places... </title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/fonts/line-icons.css" />
  <link rel="stylesheet" href="assets/css/slicknav.css" />
  <link rel="stylesheet" href="assets/css/menu_sideslide.css" />
  <link rel="stylesheet" href="assets/css/vegas.min.css" />
  <link rel="stylesheet" href="assets/css/animate.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }
    main {
      flex: 1;
    }
    .heading-count h2 {
      color: #6C5CE7;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .empresa {
      font-size: 1.2em;
      margin-top: 40px;
    }
    .grupo {
      font-weight: bold;
    }
    .button-group .btn {
      font-size: 16px;
      padding: 12px 28px;
      margin: 5px;
      border-radius: 30px;
      background-color: rgba(255, 255, 255, 0.5);
      color: #6C5CE7;
      backdrop-filter: blur(2px);
      border: 2px solid #6C5CE7;
      transition: all 0.3s ease;
    }
    .btn-common:hover,
    .btn-border:hover {
      background-color: #6C5CE7;
      color: #fff;
    }
    .social {
      margin-top: 40px;
    }
    .social a {
      display: inline-block;
      margin: 0 8px;
      font-size: 20px;
      width: 40px;
      height: 40px;
      line-height: 40px;
      border-radius: 70%;
      background-color: #f1f1f1;
      color: #6C5CE7;
      transition: all 0.3s ease;
      text-align: center;
    }
    .social a:hover {
      background-color: #6C5CE7;
      color: #fff;
    }
    .slider {
      height: 100vh !important;
    }
    #redirect-info {
      text-align: center;
      font-size: 1em;
      padding: 20px;
      background-color: #f9f9f9;
    }
    footer {
      background: #222;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    footer a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <div class="bg-wraper overlay has-vignette">
      <div id="example" class="slider vegas-container"></div>
    </div>

    <section class="countdown-timer">
      <div class="container">
        <div class="row text-center">
          <div class="col-md-12">
            <div class="heading-count">
              <h2>MultiMarketPlace</h2>
			<br></br><br></br><br></br>
			</div>
	</div>	
      <div class="col-md-12 col-sm-12 col-xs-12">
            <p class="empresa">
              <span class="grupo">MultiMarketPlace © </span> - idea meet places... - <br>
			  <span class="grupo">Grupo MultiMark</span><br><br>
            </p>
          <a href="https://multimark.com.ar/#contactus" target="_blank" class="btn btn-common">Contacto</a><br>
		  Tenga en cuenta que en 40 seg. el sitio se dirigirá a <strong>MultiMark.com.ar</strong>

        </div>
      </div>
    </div>
  </div>
</section>
  </main>
  <footer>
    <p>
      By Imagery.com.ar
      <a href="https://multimark.com.ar" rel="nofollow">Visitar Multimark</a>
    </p>
  </footer>

    <script src="assets/js/jquery-min.js"></script>
    <script src="assets/js/popper.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/vegas.min.js"></script>
    <script src="assets/js/jquery.countdown.min.js"></script>
    <script src="assets/js/classie.js"></script>
    <script src="assets/js/jquery.nav.js"></script>
    <script src="assets/js/jquery.easing.min.js"></script> 
    <script src="assets/js/main.js"></script>


    <script type="text/javascript">
      $("#example").vegas({
          timer: false,
          delay: 6000,
          transitionDuration: 2000,
          transition: "blur",
          slides: [
              { src: "assets/img/slide-01.jpg" },
              { src: "assets/img/slide-02.jpg" },
              { src: "assets/img/slide-03.jpg" },
			  { src: "assets/img/slide-04.jpg" }
          ]
      });
    </script>
	
	<script>
  setTimeout(function () {
    window.location.href = "https://multimark.com.ar/";
  }, 45000); /* 60000 ms = 60 segundos */
</script>

</body>
</html>
